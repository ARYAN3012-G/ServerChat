<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <style>
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.5; } }
    @keyframes rotate { from { transform: rotate(0deg); transform-origin: 16px 16px; } to { transform: rotate(360deg); transform-origin: 16px 16px; } }
    .ring { animation: rotate 4s linear infinite; }
    .dot { animation: pulse 2s ease-in-out infinite; }
    .dot2 { animation: pulse 2s ease-in-out infinite; animation-delay: 0.3s; }
    .dot3 { animation: pulse 2s ease-in-out infinite; animation-delay: 0.6s; }
  </style>
  <defs>
    <linearGradient id="g" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8e939e;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#040407"/>
  <!-- Rotating ring -->
  <circle class="ring" cx="16" cy="16" r="12" fill="none" stroke="url(#g)" stroke-width="1.5" stroke-dasharray="8 4" opacity="0.4"/>
  <!-- Chat bubble icon -->
  <path d="M10 12C10 10.9 10.9 10 12 10H20C21.1 10 22 10.9 22 12V18C22 19.1 21.1 20 20 20H14L11 22.5V20H12C10.9 20 10 19.1 10 18V12Z" fill="url(#g)"/>
  <!-- Animated dots -->
  <circle class="dot" cx="13.5" cy="15" r="1" fill="#040407"/>
  <circle class="dot2" cx="16" cy="15" r="1" fill="#040407"/>
  <circle class="dot3" cx="18.5" cy="15" r="1" fill="#040407"/>
</svg>
