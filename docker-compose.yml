version: '3.8'

services:
  # MongoDB
  mongo:
    image: mongo:7
    container_name: serverchat-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: serverchat

  # Redis
  redis:
    image: redis:7-alpine
    container_name: serverchat-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: serverchat-server
    restart: unless-stopped
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - redis
    env_file:
      - .env
    environment:
      MONGODB_URI: mongodb://mongo:27017/serverchat
      REDIS_URL: redis://redis:6379
    volumes:
      - ./server:/app
      - /app/node_modules

  # Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: serverchat-client
    restart: unless-stopped
    ports:
      - "3000:3000"
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_API_URL: http://server:5000
    volumes:
      - ./client:/app
      - /app/node_modules
      - /app/.next

  # Nginx
  nginx:
    image: nginx:alpine
    container_name: serverchat-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      - server
      - client
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf

volumes:
  mongo_data:
  redis_data:
